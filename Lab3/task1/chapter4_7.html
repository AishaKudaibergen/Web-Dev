<!DOCTYPE html>
<script>
"use strict";

let id1 = Symbol("id");
let id2 = Symbol("id");

alert(id1 == id2); // false


let user = { // belongs to another code
  name: "John"
};

let id = Symbol("id");

user[id] = 1;

alert( user[id] ); // we can access the data using the symbol as the key



// get symbol by name
let sym = Symbol.for("name");
let sym2 = Symbol.for("id");

// get name by symbol
alert( Symbol.keyFor(sym) ); // name
alert( Symbol.keyFor(sym2) ); // id


</script>
